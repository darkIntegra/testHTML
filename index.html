<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Авторизация</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { 
      background: #1c1c1e; 
      color: #fff; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      margin: 0; 
      padding: 20px; 
      box-sizing: border-box; 
      text-align: center;
    }
    .card { 
      background: #2c2c2e; 
      padding: 24px; 
      border-radius: 16px; 
      max-width: 340px; 
      width: 100%;
    }
    .status { font-size: 15px; margin: 16px 0; line-height: 1.4; white-space: pre-wrap; word-break: break-all; }
    .token { 
      background: #1a1a1c; 
      padding: 12px; 
      border-radius: 8px; 
      font-family: monospace; 
      font-size: 12px; 
      margin: 10px 0;
      user-select: all;
    }
    .btn {
      background: #007aff;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }
    .btn:active { background: #005ecb; }
    .loader {
      width: 28px; height: 28px;
      border: 3px solid #4a4a4a;
      border-top-color: #007aff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="loader" id="loader"></div>
    <div class="status" id="status">🔄 Подключение к Telegram...</div>
    <div id="tokenBlock" style="display:none;">
      <div style="font-size:13px;color:#8e8e93;">Ваш токен доступа:</div>
      <div class="token" id="tokenValue"></div>
      <button class="btn" onclick="copyToken()">📋 Скопировать</button>
      <div style="font-size:12px;color:#8e8e93;margin-top:10px;">
        Отправьте этот токен сообщением в бота @TeamReadyBot
      </div>
    </div>
  </div>

  <script>
    // 🔥 Конфигурация
    const API_URL = 'https://node1.cl.hamsterpvp.com/prod/auth/telegram';
    
    window.onload = async function() {
      const tg = window.Telegram?.WebApp;
      const status = document.getElementById('status');
      const loader = document.getElementById('loader');
      const tokenBlock = document.getElementById('tokenBlock');
      const tokenValue = document.getElementById('tokenValue');

      if (!tg) {
        status.innerText = "❌ Откройте эту ссылку внутри приложения Telegram";
        loader.style.display = 'none';
        return;
      }

      // Расширяем окно на весь экран
      tg.expand();

      if (!tg.initData) {
        status.innerText = "⚠️ Не удалось получить initData.\nУбедитесь, что мини-приложение открыто в том боте, для которого оно настроено.";
        loader.style.display = 'none';
        return;
      }

      try {
        status.innerText = "🔐 Авторизация...";
        
        // 🔥 Отправляем initData напрямую на сервер (как в рабочем Postman)
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'Accept': 'application/json'
          },
          body: 'initData=' + encodeURIComponent(tg.initData)
        });

        const data = await response.json();
        
        if (response.ok && data.code === 0 && data.token) {
          // ✅ Успех: показываем токен пользователю
          status.style.display = 'none';
          loader.style.display = 'none';
          tokenBlock.style.display = 'block';
          tokenValue.textContent = data.token;
          
          // Опционально: закрываем окно через 5 сек
          // setTimeout(() => tg.close(), 5000);
        } else {
          // ❌ Ошибка валидации
          const msg = data.msg || 'Неизвестная ошибка';
          status.innerText = `❌ Ошибка: ${msg}\n(${data.code || 'code: N/A'})\n\nПопробуйте нажать кнопку ещё раз.`;
          loader.style.display = 'none';
        }
      } catch (e) {
        status.innerText = `❌ Сетевая ошибка: ${e.message}\nПроверьте подключение к интернету.`;
        loader.style.display = 'none';
      }
    };

    function copyToken() {
      const token = document.getElementById('tokenValue').textContent;
      navigator.clipboard.writeText(token).then(() => {
        alert('✅ Токен скопирован! Вставьте его в чат с ботом.');
      }).catch(() => {
        alert('⚠️ Не удалось скопировать. Выделите текст и скопируйте вручную.');
      });
    }
  </script>
</body>
</html>
