<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Auth</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { background: #1c1c1e; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
    .card { background: #2c2c2e; padding: 24px; border-radius: 16px; max-width: 320px; text-align: center; }
    .status { font-size: 15px; margin: 16px 0 8px; line-height: 1.4; white-space: pre-line; }
    .loader { width: 28px; height: 28px; border: 3px solid #4a4a4a; border-top-color: #007aff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="loader" id="loader"></div>
    <div class="status" id="status">🔄 Подключение к Telegram...</div>
  </div>
  <script>
    window.onload = function() {
      const tg = window.Telegram?.WebApp;
      const status = document.getElementById('status');
      const loader = document.getElementById('loader');

      if (!tg) {
        status.innerText = "❌ Откройте эту ссылку\nвнутри приложения Telegram";
        loader.style.display = 'none';
        return;
      }

      if (tg.initData && tg.initData.length > 0) {
        status.innerText = "📤 Отправляю initData боту...";
        try {
          tg.sendData(tg.initData);
          status.innerText = "✅ Данные успешно отправлены!\nОкно закроется через 4 сек...";
          loader.style.display = 'none';
          
          // ⏱️ Увеличил задержку до 4000мс, чтобы успеть прочитать
          setTimeout(() => tg.close(), 4000);
        } catch (e) {
          status.innerText = "❌ Ошибка отправки:\n" + e.message;
          loader.style.display = 'none';
        }
      } else {
        status.innerText = "⚠️ initData пуст.\nВозможные причины:\n• Ссылка не HTTPS\n• Бот в BotFather ≠ этому\n• Открыли в браузере";
        loader.style.display = 'none';
      }
    };
  </script>
</body>
</html>
