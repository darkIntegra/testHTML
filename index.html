<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hamster Fight Assistant</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { 
      background: #1c1c1e; 
      color: #fff; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      margin: 0; 
      padding: 20px; 
      box-sizing: border-box; 
      text-align: center; 
    }
    .card { 
      background: #2c2c2e; 
      padding: 24px; 
      border-radius: 16px; 
      max-width: 340px; 
      width: 100%; 
    }
    .status { 
      font-size: 15px; 
      margin: 16px 0; 
      line-height: 1.4; 
      white-space: pre-wrap; 
      word-break: break-all; 
    }
    .token { 
      background: #1a1a1c; 
      padding: 12px; 
      border-radius: 8px; 
      font-family: monospace; 
      font-size: 12px; 
      margin: 10px 0; 
      user-select: all; 
      cursor: pointer; 
      overflow-x: auto;
    }
    .btn { 
      background: #007aff; 
      color: white; 
      border: none; 
      padding: 12px 24px; 
      border-radius: 10px; 
      font-size: 16px; 
      cursor: pointer; 
      margin-top: 10px; 
      width: 100%; 
    }
    .btn:active { background: #005ecb; }
    .btn-secondary {
      background: #3a3a3c;
      margin-top: 8px;
    }
    .btn-danger {
      background: #ff3b30;
    }
    .loader { 
      width: 28px; 
      height: 28px; 
      border: 3px solid #4a4a4a; 
      border-top-color: #007aff; 
      border-radius: 50%; 
      animation: spin 0.8s linear infinite; 
      margin: 0 auto 12px; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .log {
      font-size: 11px;
      color: #666;
      margin-top: 10px;
      text-align: left;
      background: #1a1a1c;
      padding: 8px;
      border-radius: 6px;
      max-height: 100px;
      overflow-y: auto;
    }
    .admin-panel {
      background: #3a3a3c;
      padding: 12px;
      border-radius: 8px;
      margin: 10px 0;
    }
    .user-menu {
      margin-top: 16px;
    }
    .access-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .badge-admin { background: #ff9500; color: #000; }
    .badge-user { background: #34c759; color: #000; }
    .badge-denied { background: #ff3b30; color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="loader" id="loader"></div>
    
    <!-- Шаг 1: Загрузка -->
    <div id="stepLoading">
      <div class="status" id="status">🔄 Подключение к Telegram...</div>
      <div class="log" id="debugLog"></div>
    </div>
    
    <!-- Шаг 2: Успех (универсальный) -->
    <div id="stepSuccess" class="hidden">
      <div id="accessBadge" class="access-badge"></div>
      <div class="status" id="successStatus"></div>
      
      <!-- Блок для админа -->
      <div id="adminBlock" class="hidden admin-panel">
        <div style="font-size:13px;color:#8e8e93;margin-bottom:8px;">👑 Панель администратора</div>
        <button class="btn" onclick="openAdminPanel()">🌐 Открыть веб-админку</button>
        <button class="btn btn-secondary" onclick="tg.close()">↩️ В бота</button>
      </div>
      
      <!-- Блок для авторизованного пользователя -->
      <div id="userBlock" class="hidden user-menu">
        <div style="font-size:13px;color:#8e8e93;margin-bottom:8px;">Токен аккаунта:</div>
        <div class="token" id="tokenValue" onclick="copyToken()"></div>
        <button class="btn" onclick="copyToken()">📋 Скопировать токен</button>
        
        <div style="margin-top:16px;border-top:1px solid #4a4a4a;padding-top:16px;">
          <button class="btn" onclick="startBattle()">⚔️ Начать бой</button>
          <button class="btn btn-secondary" onclick="watchAds()">📺 Просмотреть рекламу</button>
          <button class="btn btn-secondary" onclick="showStats()">📊 Статистика</button>
        </div>
        <button class="btn btn-secondary" onclick="tg.close()">↩️ В бота</button>
      </div>
      
      <!-- Блок для отказа в доступе -->
      <div id="deniedBlock" class="hidden">
        <button class="btn btn-danger" onclick="tg.close()">↩️ В бота</button>
        <div style="font-size:12px;color:#8e8e93;margin-top:12px;">
          Для получения доступа обратитесь к администратору.
        </div>
      </div>
    </div>
    
    <!-- Шаг 3: Ошибка -->
    <div id="stepError" class="hidden">
      <div class="status" id="errorMsg">❌ Ошибка</div>
      <button class="btn" onclick="retryAuth()">🔄 Повторить</button>
      <button class="btn btn-secondary" onclick="tg.close()">↩️ В бота</button>
    </div>
  </div>

  <script>
    // 🔥 Конфигурация
    const API_BASE = 'https://your-backend-domain.com/api/telegram';

    let tg, statusEl, loader, debugLog;
    
    window.onload = async function() {
      tg = window.Telegram?.WebApp;
      statusEl = document.getElementById('status');
      loader = document.getElementById('loader');
      debugLog = document.getElementById('debugLog');

      if (!tg) {
        showError("❌ Откройте эту страницу внутри Telegram");
        return;
      }
      
      tg.expand();
      
      // Получаем chat_id из initData Telegram
      if (!tg.initDataUnsafe?.user?.id) {
        showError("⚠️ Не удалось получить ваш chat_id");
        return;
      }
      
      const chatId = tg.initDataUnsafe.user.id;
      log("👤 Пользователь: chat_id=" + chatId);
      
      await checkAccess(chatId);
    };

    async function checkAccess(chatId) {
      try {
        statusEl.innerText = "🔐 Проверка доступа...";
        log("📤 Запрос к: " + API_BASE + "/access?chatId=" + chatId);
        
        const response = await fetch(API_BASE + '/access?chatId=' + chatId, {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        });
        
        log("📥 Статус ответа: " + response.status);
        
        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }
        
        const data = await response.json();
        log("📦 Ответ: " + JSON.stringify(data));
        
        handleAccessResponse(data);
        
      } catch (e) {
        log("❌ Ошибка: " + e.message);
        showError("❌ Ошибка подключения: " + e.message);
      }
    }

    function handleAccessResponse(data) {
      // Скрываем загрузку
      document.getElementById('stepLoading').classList.add('hidden');
      loader.style.display = 'none';
      document.getElementById('stepSuccess').classList.remove('hidden');
      
      const badge = document.getElementById('accessBadge');
      const successStatus = document.getElementById('successStatus');
      
      // === УРОВЕНЬ 1: АДМИН ===
      if (data.level === 'ADMIN') {
        badge.textContent = '👑 АДМИНИСТРАТОР';
        badge.className = 'access-badge badge-admin';
        successStatus.innerHTML = `<b>Полный доступ</b><br>chat_id: ${data.chatId || '—'}`;
        
        document.getElementById('adminBlock').classList.remove('hidden');
        document.getElementById('userBlock').classList.add('hidden');
        document.getElementById('deniedBlock').classList.add('hidden');
        
      // === УРОВЕНЬ 2: АВТОРИЗОВАННЫЙ ПОЛЬЗОВАТЕЛЬ ===
      } else if (data.level === 'AUTHORIZED') {
        badge.textContent = '✅ АВТОРИЗОВАН';
        badge.className = 'access-badge badge-user';
        successStatus.innerHTML = `<b>${data.accountName || 'Аккаунт'}</b><br>Доступ разрешён`;
        
        document.getElementById('tokenValue').textContent = data.token || '—';
        document.getElementById('adminBlock').classList.add('hidden');
        document.getElementById('userBlock').classList.remove('hidden');
        document.getElementById('deniedBlock').classList.add('hidden');
        
      // === УРОВЕНЬ 3: ОТКАЗ В ДОСТУПЕ ===
      } else {
        badge.textContent = '❌ ДОСТУП ЗАПРЕЩЁН';
        badge.className = 'access-badge badge-denied';
        successStatus.innerHTML = `<b>Нет доступа</b><br>${data.message || 'Обратитесь к администратору'}`;
        
        document.getElementById('adminBlock').classList.add('hidden');
        document.getElementById('userBlock').classList.add('hidden');
        document.getElementById('deniedBlock').classList.remove('hidden');
      }
    }

    function showError(message) {
      document.getElementById('stepLoading').classList.add('hidden');
      loader.style.display = 'none';
      document.getElementById('stepError').classList.remove('hidden');
      document.getElementById('errorMsg').innerText = message;
      log("🛑 Стоп");
    }

    function retryAuth() {
      location.reload();
    }

    async function copyToken() {
      const token = document.getElementById('tokenValue').textContent;
      if (!token || token === '—') return;
      try {
        await navigator.clipboard.writeText(token);
        tg?.showPopup?.({ title: '✅ Готово!', message: 'Токен скопирован в буфер обмена.' });
      } catch {
        alert('⚠️ Скопируйте вручную: выделите текст и нажмите Ctrl+C');
      }
    }

    // === Кнопки действий (заглушки — потом реализую на бекенде⚠️) ===
    
    function startBattle() {
      tg?.showPopup?.({ 
        title: '⚔️ Бой', 
        message: 'Запуск боя...\n(реализуй вызов API на бекенде)' 
      });
      // Пример реального вызова:
      // fetch(API_BASE + '/battle/start', { method: 'POST', body: JSON.stringify({ accountId: '...' }) });
    }

    function watchAds() {
      tg?.showPopup?.({ 
        title: '📺 Реклама', 
        message: 'Просмотр рекламы...\n(реализуй вызов API на бекенде)' 
      });
    }

    function showStats() {
      tg?.showPopup?.({ 
        title: '📊 Статистика', 
        message: 'Загрузка статистики...\n(реализуй вызов API на бекенде)' 
      });
    }

    function openAdminPanel() {
      // Открываем веб-админку в новом окне (или редирект)
      window.open('https://darkIntegra.github.io/testHTML/admin.html', '_blank');
      // Или: window.location.href = '/admin';
    }

    function log(msg) {
      console.log(msg);
      if (debugLog) {
        debugLog.innerHTML += '<div>[' + new Date().toLocaleTimeString() + '] ' + msg + '</div>';
        debugLog.scrollTop = debugLog.scrollHeight;
      }
    }
  </script>
</body>
</html>
