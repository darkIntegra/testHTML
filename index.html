<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Auth Debug</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { background: #1c1c1e; color: #fff; font-family: monospace; padding: 15px; margin: 0; font-size: 13px; }
    .log { background: #2c2c2e; padding: 10px; border-radius: 8px; margin: 10px 0; }
    .ok { color: #34c759; }
    .err { color: #ff453a; }
    .warn { color: #ff9f0a; }
  </style>
</head>
<body>
  <div id="log"></div>
  <script>
    const log = (msg, cls = '') => {
      const div = document.createElement('div');
      div.className = 'log ' + cls;
      div.innerText = new Date().toLocaleTimeString() + ' ' + msg;
      document.getElementById('log').appendChild(div);
    };

    log('🚀 Страница загружена');

    const tg = window.Telegram?.WebApp;
    if (!tg) {
      log('❌ Telegram.WebApp не найден. Откройте внутри Telegram.', 'err');
    } else {
      log('✅ Telegram.WebApp найден', 'ok');
      log('📦 initData длина: ' + (tg.initData?.length || 0));
      
      if (tg.initData) {
        log('🔄 Вызываю sendData()...');
        try {
          tg.sendData(tg.initData);
          log('✅ sendData() вызван без ошибок', 'ok');
          setTimeout(() => {
            log('🔒 Закрываю окно...');
            tg.close();
          }, 500);
        } catch (e) {
          log('❌ Ошибка sendData(): ' + e.message, 'err');
        }
      } else {
        log('⚠️ initData пуст. Возможные причины:', 'warn');
        log('• Открыли в обычном браузере, а не в Telegram');
        log('• Бот не совпадает с тем, что настроен в WebApp');
        log('• Страница загружается по HTTP, а не HTTPS');
      }
    }
  </script>
</body>
</html>
