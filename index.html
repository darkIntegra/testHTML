<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth</title>
  <!-- Библиотека Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>body { background: #1c1c1e; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }</style>
</head>
<body>
  <div id="status">🔄 Инициализация...</div>
  <script>
    window.onload = function() {
      const tg = window.Telegram?.WebApp;
      if (!tg) {
        document.getElementById('status').innerText = "❌ Откройте это внутри Telegram";
        return;
      }
      // Автоматически отправляем initData в бот и закрываем окно
      if (tg.initData) {
        tg.sendData(tg.initData);
        tg.close();
      }
    };
  </script>
</body>
</html>
