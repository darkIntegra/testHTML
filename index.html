<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Авторизация</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { 
      background: #1c1c1e; 
      color: #fff; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      margin: 0; 
      padding: 20px; 
      box-sizing: border-box; 
      text-align: center; 
    }
    .card { 
      background: #2c2c2e; 
      padding: 24px; 
      border-radius: 16px; 
      max-width: 340px; 
      width: 100%; 
    }
    .status { 
      font-size: 15px; 
      margin: 16px 0; 
      line-height: 1.4; 
      white-space: pre-wrap; 
      word-break: break-all; 
    }
    .token { 
      background: #1a1a1c; 
      padding: 12px; 
      border-radius: 8px; 
      font-family: monospace; 
      font-size: 12px; 
      margin: 10px 0; 
      user-select: all; 
      cursor: pointer; 
      overflow-x: auto;
    }
    .btn { 
      background: #007aff; 
      color: white; 
      border: none; 
      padding: 12px 24px; 
      border-radius: 10px; 
      font-size: 16px; 
      cursor: pointer; 
      margin-top: 10px; 
      width: 100%; 
    }
    .btn:active { background: #005ecb; }
    .btn-secondary {
      background: #3a3a3c;
      margin-top: 8px;
    }
    .loader { 
      width: 28px; 
      height: 28px; 
      border: 3px solid #4a4a4a; 
      border-top-color: #007aff; 
      border-radius: 50%; 
      animation: spin 0.8s linear infinite; 
      margin: 0 auto 12px; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .log {
      font-size: 11px;
      color: #666;
      margin-top: 10px;
      text-align: left;
      background: #1a1a1c;
      padding: 8px;
      border-radius: 6px;
      max-height: 100px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="loader" id="loader"></div>
    
    <!-- Шаг 1: Загрузка -->
    <div id="stepLoading">
      <div class="status" id="status">🔄 Подключение...</div>
      <div class="log" id="debugLog"></div>
    </div>
    
    <!-- Шаг 2: Успех -->
    <div id="stepSuccess" class="hidden">
      <div class="status" style="color:#34c759;">✅ Авторизация успешна!</div>
      <div style="font-size:13px;color:#8e8e93;">Ваш токен:</div>
      <div class="token" id="tokenValue" onclick="copyToken()"></div>
      <button class="btn" onclick="copyToken()">📋 Скопировать</button>
      <div style="font-size:12px;color:#8e8e93;margin-top:10px;">
        Отправьте этот токен в бота <b>@YourBotName</b>
      </div>
    </div>
    
    <!-- Шаг 3: Ошибка -->
    <div id="stepError" class="hidden">
      <div class="status" id="errorMsg">❌ Ошибка</div>
      <div style="font-size:13px;color:#8e8e93;margin:16px 0;">
        <b>Автоматическая авторизация не сработала.</b><br><br>
        Попробуйте:
      </div>
      <button class="btn" onclick="retryAuth()">🔄 Повторить</button>
      <button class="btn btn-secondary" onclick="showManual()">📝 Ручной ввод</button>
      <button class="btn btn-secondary" onclick="closeApp()">↩️ В бота</button>
      
      <div id="manualBlock" class="hidden" style="margin-top:16px;text-align:left;">
        <div style="font-size:12px;color:#8e8e93;">
          1. Получите токен из главного источника (@MainBot или веб-интерфейс)<br>
          2. Скопируйте его<br>
          3. Вставьте сообщением в чат с этим ботом
        </div>
      </div>
    </div>
  </div>

  <script>
    // 🔥 Конфигурация
    const TARGET_URL = 'https://node1.cl.hamsterpvp.com/prod/auth/telegram';
    
    // 🔥 ТВОЙ ПРОКСИ (уже вставлен!)
    const PROXY_URL = 'https://auth-proxy.integra4220.workers.dev/auth/telegram';
    
    // Переключатель: true = использовать прокси, false = прямой запрос
    const USE_PROXY = true;
    
    let tg, status, loader, debugLog;
    
    window.onload = async function() {
      tg = window.Telegram?.WebApp;
      status = document.getElementById('status');
      loader = document.getElementById('loader');
      debugLog = document.getElementById('debugLog');

      if (!tg) {
        showError("❌ Откройте внутри Telegram");
        return;
      }
      
      tg.expand();
      if (!tg.initData) {
        showError("⚠️ Нет initData");
        return;
      }

      log("📦 initData получен, длина: " + tg.initData.length);
      await tryAuth();
    };

    async function tryAuth() {
      try {
        status.innerText = "🔐 Отправка...";
        const url = USE_PROXY ? PROXY_URL : TARGET_URL;
        log("📤 Запрос к: " + url);
        
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000);
        
        const response = await fetch(url, {
          method: 'POST',
          mode: 'cors',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'Accept': 'application/json'
          },
          body: 'initData=' + encodeURIComponent(tg.initData),
          signal: controller.signal
        });
        clearTimeout(timeout);
        
        log("📥 Статус: " + response.status);
        
        if (!response.ok) {
          const text = await response.text();
          log("⚠️ Ответ: " + text.substring(0, 200));
          throw new Error('HTTP ' + response.status);
        }
        
        const data = await response.json();
        log("📦 Тело: " + JSON.stringify(data).substring(0, 200));
        
        if (data.code === 0 && data.token) {
          showToken(data.token);
        } else {
          throw new Error(data.msg || 'Код ' + data.code);
        }
      } catch (e) {
        log("❌ Ошибка: " + e.message);
        
        // Если прокси не сработал — пробуем прямой запрос как запасной вариант
        if (USE_PROXY && (e.message.includes('HTTP') || e.message.includes('Failed to fetch'))) {
          log("🔄 Пробуем прямой запрос (без прокси)...");
          // Временно отключаем прокси и пробуем ещё раз
          const originalUseProxy = USE_PROXY;
          // Перезапускаем с прямым запросом (упрощённо)
          try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 10000);
            const response = await fetch(TARGET_URL, {
              method: 'POST',
              mode: 'cors',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' },
              body: 'initData=' + encodeURIComponent(tg.initData),
              signal: controller.signal
            });
            clearTimeout(timeout);
            if (response.ok) {
              const data = await response.json();
              if (data.code === 0 && data.token) {
                showToken(data.token);
                return;
              }
            }
          } catch (e2) {
            log("❌ Прямой запрос тоже не сработал: " + e2.message);
          }
        }
        
        showError(e.message.includes('Failed to fetch') || e.name === 'TypeError' 
          ? "🔒 CORS блокировка.\nСервер не разрешает запросы с этого домена." 
          : "❌ " + e.message);
      }
    }

    function showToken(token) {
      document.getElementById('stepLoading').classList.add('hidden');
      loader.style.display = 'none';
      document.getElementById('stepSuccess').classList.remove('hidden');
      document.getElementById('tokenValue').textContent = token;
      log("✅ Токен получен");
    }

    function showError(message) {
      document.getElementById('stepLoading').classList.add('hidden');
      loader.style.display = 'none';
      document.getElementById('stepError').classList.remove('hidden');
      document.getElementById('errorMsg').innerText = message;
      log("🛑 Стоп");
    }

    function showManual() {
      document.getElementById('manualBlock').classList.remove('hidden');
    }

    function retryAuth() {
      location.reload();
    }

    function closeApp() {
      tg.close();
    }

    async function copyToken() {
      const token = document.getElementById('tokenValue').textContent;
      if (!token) return;
      try {
        await navigator.clipboard.writeText(token);
        if (tg?.showPopup) {
          tg.showPopup({ title: '✅ Готово!', message: 'Токен скопирован. Вставьте в чат с ботом.' });
        } else {
          alert('✅ Токен скопирован!');
        }
      } catch {
        alert('⚠️ Скопируйте вручную: выделите текст и нажмите Ctrl+C');
      }
    }

    function log(msg) {
      console.log(msg);
      if (debugLog) {
        debugLog.innerHTML += '<div>' + new Date().toLocaleTimeString() + ' ' + msg + '</div>';
        debugLog.scrollTop = debugLog.scrollHeight;
      }
    }
  </script>
</body>
</html>
